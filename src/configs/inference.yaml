defaults:
  - model: admm
  - metrics: reconstruction
  - datasets: example_eval # we do not want to run inference on training data
  - dataloader: example
  - transforms: none
  - _self_
inferencer:
  device_tensors: ["lensless", "lensed", "psf"] # which tensors should be on device (ex. GPU)
  device: auto # device name or "auto"
  save_path: "example" # any name here, can be a dataset name
  seed: 1
  from_pretrained: null # path to the pretrained model
